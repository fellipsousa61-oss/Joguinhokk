<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Galáxia de Corações</title>
<link rel="stylesheet" href="style.css">
</head>


<button class="poemasBtn">Poemas ❤️</button>


<div class="poemaBox">

    <button class="arrow left">❮</button>


    <div class="poema">

        <span class="fechar">×</span>

        <h2>Para você ❤️</h2>

        <p class="textoPoema"></p>

    </div>


    <button class="arrow right">❯</button>


</div>

<body>

<div class="galaxy">

    <div class="nebula"></div>

    <div class="core">
        ❤
    </div>

    <div class="ring ring1">
        <div class="heart">❤</div>
    </div>

    <div class="ring ring2">
        <div class="heart">❤</div>
    </div>

    <div class="ring ring3">
        <div class="heart">❤</div>
    </div>

</div>


<script src="script.js"></script>

</body>
</html>
